# Local SSH server for smoke tests (issue #16).
#
#   bash tests/fixtures/generate-keys.sh
#   cd tests/fixtures && docker compose up -d --build
#   npm run smoke:ssh
#
services:
  sshd:
    build: .
    ports:
      - '2222:2222'
    healthcheck:
      test: ['CMD-SHELL', 'nc -z localhost 2222']
      interval: 5s
      timeout: 3s
      retries: 10
