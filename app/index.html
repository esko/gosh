<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#071015" />
    <title>Gosh</title>
    <link rel="manifest" href="/.well-known/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon-48.png" type="image/png" sizes="48x48" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <!-- Paint the dark base immediately so navigation/load never flashes a
         white body before styles.css (loaded via the JS module) applies. -->
    <style>
      html { color-scheme: dark; background-color: #16171b; }
      /* Unframed IWA: keep the window clear-color transparent so ChromeOS can
         anti-alias the 12px rounded clip. An opaque html/manifest fill paints
         square corners behind the caption. */
      @media (display-mode: unframed), (display-mode: borderless) {
        html { background-color: transparent; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
